<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Duo Challenges</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'challenges/css/style.css' %}">
</head>
<body>
    <div class="app-shell">
        <nav>
            <a class="brand" href="{% url 'challenges_lijst' %}">
                <span class="logo-mark"></span>
                <span>Duo Challenges</span>
            </a>
            {% if user.is_authenticated %}
                <div class="nav-links">
                    <a href="{% url 'challenges_lijst' %}">Explore</a>
                    <a href="{% url 'mijn_projecten' %}">Mijn projecten</a>
                    {% if request.user.profiel.rol == 'begeleider' %}
                        <a href="{% url 'challenge_aanmaken' %}">Nieuwe challenge</a>
                        <a href="{% url 'projecten_zonder_partner' %}">Zonder partner</a>
                        <a href="{% url 'overzicht_ingediend' %}">Ingediend</a>
                    {% endif %}
                    <a class="user-avatar" href="{% url 'profiel' %}">{{ user.username|first|upper }}</a>
                    <a href="{% url 'logout' %}">Uitloggen</a>
                </div>
            {% endif %}
        </nav>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
