{% extends 'base.html' %}
{% block content %}
    <h2>Project beoordelen</h2>
    <p><strong>Deelnemer:</strong> {{ project.deelnemer.username }}</p>
    <p><strong>Challenge:</strong> {{ project.challenge.titel }}</p>
    <p><strong>GitHub:</strong> <a href="{{ project.github_link }}" target="_blank">{{ project.github_link }}</a></p>

    <form method="post">
        {% csrf_token %}
        <label>Beslissing:</label><br>
        <select name="beslissing">
            <option value="goedgekeurd">Goedgekeurd</option>
            <option value="afgekeurd">Afgekeurd</option>
        </select><br><br>
        <label>Feedback:</label><br>
        <textarea name="feedback" rows="4" style="width: 100%; padding: 0.5rem;"></textarea><br><br>
        <button type="submit">Opslaan</button>
    </form>
{% endblock %}
