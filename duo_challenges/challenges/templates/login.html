{% extends 'base.html' %}
{% block content %}
    <h2>Inloggen</h2>
    {% if fout %}
        <p style="color: red;">{{ fout }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Gebruikersnaam</label><br>
        <input type="text" name="gebruikersnaam"><br><br>
        <label>Wachtwoord</label><br>
        <input type="password" name="wachtwoord"><br><br>
        <button type="submit">Inloggen</button>
    </form>
{% endblock %}
